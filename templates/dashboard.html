<!DOCTYPE html>
<html>
<head>
    <title>Real-Time Network Analyzer</title>
</head>
<body>

<h1>Real-Time Network Traffic Analyzer</h1>

<h2>Packets: <span id="packets">0</span></h2>
<h2>Bytes: <span id="bytes">0</span></h2>

<h3>TCP: <span id="tcp">0</span></h3>
<h3>UDP: <span id="udp">0</span></h3>
<h3>ICMP: <span id="icmp">0</span></h3>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<h2>Top Source IPs</h2>

<table border="1">
    <thead>
        <tr>
            <th>IP Address</th>
            <th>Packets</th>
        </tr>
    </thead>

    <tbody id="ipTable"></tbody>
</table>

<canvas id="trafficChart"></canvas>

<script>
const socket = io();

let packets = [];
let bytes = [];

const ctx = document.getElementById("trafficChart");

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [
            {
                label: "Packets",
                data: [],
                borderWidth: 2
            },
            {
                label: "Bytes",
                data: [],
                borderWidth: 2
            }
        ]
    }
});

socket.on("update", function(data){

    document.getElementById("packets").innerText = data.packet_count;
    document.getElementById("bytes").innerText = data.total_bytes;
    
    document.getElementById("tcp").innerText = data.tcp;
    document.getElementById("udp").innerText = data.udp;
    document.getElementById("icmp").innerText = data.icmp;

    packets.push(data.packet_count);
    bytes.push(data.total_bytes);

    if(packets.length > 20){
        packets.shift();
        bytes.shift();
        chart.data.labels.shift();
    }

    chart.data.labels.push("");
    chart.data.datasets[0].data = packets;
    chart.data.datasets[1].data = bytes;

    chart.update();
});

async function loadTopIPs(){

    const response = await fetch("/top_ips");
    const data = await response.json();

    let html = "";

    data.forEach(row => {

        html += `
        <tr>
            <td>${row[0]}</td>
            <td>${row[1]}</td>
        </tr>
        `;
    });

    document.getElementById("ipTable").innerHTML = html;
}

setInterval(loadTopIPs, 2000);
</script>

</body>
</html>
